[main]
# Fuente pixelada (Chicago95)
font=MorePerfectDOSVGA:size=12
pad=5x5

[colors]
# Colores de la interfaz de Windows 98
background=c0c0c0
foreground=000000

# NUEVA SINTAXIS: El color del cursor se define aquí
# Formato: <color del texto> <color del bloque>
cursor=c0c0c0 000000

## Paleta de 16 colores (Estilo VGA/Win98)
regular0=000000  # Negro
regular1=800000  # Rojo oscuro
regular2=008000  # Verde oscuro
regular3=808000  # Amarillo/Marrón
regular4=000080  # Azul oscuro
regular5=800080  # Púrpura
regular6=008080  # Cian/Teal
regular7=c0c0c0  # Gris claro (Plata)

bright0=808080   # Gris oscuro
bright1=ff0000   # Rojo brillante
bright2=00ff00   # Verde brillante
bright3=ffff00   # Amarillo brillante
bright4=0000ff   # Azul brillante
bright5=ff00ff   # Magenta
bright6=00ffff   # Cian brillante
bright7=ffffff   # Blanco puro

[cursor]
# Aquí SOLO dejas el estilo y el parpadeo
style=block
blink=yes

